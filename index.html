<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>폼롤러 운동 타이머</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#4f8ef7">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="icon-192.png">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:     #111318;
      --surf:   #1a1d24;
      --surf2:  #22262f;
      --border: #2d3139;
      --text:   #e8eaf0;
      --muted:  #7c8190;
      --blue:   #4f8ef7;
      --green:  #3ecc71;
      --orange: #f09542;
      --red:    #e05252;
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      overflow: hidden;
      display: grid;
      grid-template-columns: 360px 1fr;
    }

    /* ── Sidebar ── */
    .sidebar {
      background: var(--surf);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .s-head {
      padding: 18px 16px 0;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .s-head h1 {
      font-size: 1.35rem;
      font-weight: 800;
      color: var(--blue);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 9px;
      line-height: 1.3;
    }

    .h1-title {
      display: flex;
      align-items: center;
      gap: 9px;
    }

    .s-sub {
      font-size: 0.75rem;
      color: var(--muted);
      margin-top: 5px;
    }

    .all-ctrl {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid var(--border);
    }

    .all-ctrl label {
      font-size: 0.75rem;
      color: var(--muted);
      flex-shrink: 0;
    }

    .all-sel {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 0.78rem;
      padding: 4px 6px;
      border-radius: 6px;
      cursor: pointer;
    }

    .all-btn {
      background: var(--blue);
      border: none;
      color: #fff;
      font-size: 0.75rem;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 6px;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
      transition: background 0.15s;
    }

    .all-btn:hover { background: #6ba0f9; }

    /* 접히는 설정 영역 */
    .s-collapsible {
      overflow: hidden;
      max-height: 0;
      transition: max-height 0.32s ease;
    }
    .s-collapsible.open {
      max-height: 60px;
    }

    /* 드래그 핸들 */
    .s-drag-handle {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 7px 0 5px;
      cursor: ns-resize;
      touch-action: none;
      user-select: none;
    }
    .s-drag-handle::after {
      content: '';
      display: block;
      width: 32px;
      height: 3px;
      border-radius: 2px;
      background: var(--border);
      transition: background 0.2s, width 0.2s;
    }
    .s-drag-handle:hover::after { background: var(--muted); }
    .s-drag-handle.open::after  { background: var(--blue); width: 20px; }

    .install-btn {
      display: none;
      align-items: center;
      gap: 5px;
      background: rgba(62,204,113,0.12);
      border: 1px solid rgba(62,204,113,0.4);
      color: var(--green);
      font-size: 0.75rem;
      font-weight: 600;
      padding: 5px 12px;
      border-radius: 20px;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.15s;
      width: fit-content;
    }

    .install-btn:hover { background: rgba(62,204,113,0.22); }

    .yt-btn {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.3);
      color: #fff;
      font-size: 0.72rem;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 20px;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.15s;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .yt-btn:hover { background: rgba(255,255,255,0.18); }

    .browser-banner {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 999;
      background: #1a1000;
      border-bottom: 1px solid #f09542;
      padding: 10px 16px;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    .browser-banner span {
      flex: 1;
      font-size: 0.8rem;
      color: #f0c080;
      min-width: 200px;
    }

    .chrome-btn {
      background: #4285f4;
      border: none;
      color: #fff;
      font-size: 0.78rem;
      font-weight: 700;
      padding: 6px 14px;
      border-radius: 20px;
      cursor: pointer;
      white-space: nowrap;
      text-decoration: none;
      display: inline-block;
    }

    .chrome-btn:hover { background: #5a95f5; }

    .banner-close {
      background: none;
      border: none;
      color: #f09542;
      font-size: 1.1rem;
      cursor: pointer;
      padding: 0 4px;
      flex-shrink: 0;
    }

    .ex-list {
      flex: 1;
      overflow-y: auto;
      padding: 6px;
      list-style: none;
    }

    .ex-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      border-radius: 8px;
      cursor: pointer;
      border: 1px solid transparent;
      transition: background 0.12s;
      margin-bottom: 2px;
    }

    .ex-item:hover { background: var(--surf2); }

    .ex-item.active {
      background: rgba(79,142,247,0.1);
      border-color: rgba(79,142,247,0.35);
    }

    .ex-item.done .ex-badge {
      background: var(--green);
      color: #000;
    }

    .ex-badge {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      background: var(--surf2);
      color: var(--muted);
      font-size: 0.7rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .ex-name {
      flex: 1;
      font-size: 0.83rem;
      line-height: 1.35;
    }

    .dur-sel {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 0.75rem;
      padding: 3px 4px;
      border-radius: 6px;
      cursor: pointer;
      flex-shrink: 0;
    }

    /* ── Main ── */
    .main {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 40px;
      position: relative;
    }

    .prog-bar {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: var(--border);
    }

    #progFill {
      height: 100%;
      background: linear-gradient(90deg, var(--blue), var(--green));
      transition: width 0.5s ease;
      width: 0%;
    }

    .phase-tag {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 3px 13px;
      border-radius: 20px;
      background: var(--surf2);
      color: var(--muted);
      margin-bottom: 10px;
    }

    .phase-tag.prep     { background: rgba(240,149,66,0.15); color: var(--orange); }
    .phase-tag.exercise { background: rgba(62,204,113,0.15); color: var(--green); }
    .phase-tag.done     { background: rgba(79,142,247,0.15); color: var(--blue); }

    .counter {
      font-size: 0.8rem;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .ex-title {
      font-size: 1.9rem;
      font-weight: 800;
      text-align: center;
      min-height: 70px;
      display: flex;
      align-items: center;
      margin-bottom: 28px;
      line-height: 1.2;
    }

    /* Ring */
    .ring-wrap {
      position: relative;
      width: 240px;
      height: 240px;
      margin-bottom: 32px;
    }

    .ring-svg {
      width: 100%;
      height: 100%;
      transform: rotate(-90deg);
    }

    .r-bg { fill: none; stroke: var(--border); stroke-width: 10; }

    .r-fg {
      fill: none;
      stroke: var(--green);
      stroke-width: 10;
      stroke-linecap: round;
      transition: stroke-dashoffset 0.9s linear, stroke 0.3s;
    }

    .ring-center {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .r-num {
      font-size: 5rem;
      font-weight: 900;
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }

    .r-unit {
      font-size: 0.85rem;
      color: var(--muted);
      margin-top: 5px;
    }

    .ex-desc {
      font-size: 0.82rem;
      color: var(--muted);
      text-align: center;
      max-width: 480px;
      line-height: 1.6;
      min-height: 40px;
      margin-top: -18px;
      margin-bottom: 18px;
      padding: 0 8px;
    }

    /* Controls */
    .ctrls {
      display: flex;
      gap: 14px;
      align-items: center;
    }

    .btn {
      border: none;
      cursor: pointer;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.1s, background 0.15s;
    }

    .btn:hover  { transform: scale(1.07); }
    .btn:active { transform: scale(0.94); }

    .btn-sm {
      width: 50px; height: 50px;
      background: var(--surf2);
      color: var(--text);
      border: 1px solid var(--border);
      font-size: 1.25rem;
    }

    .btn-sm:hover { background: var(--border); }

    .btn-lg {
      width: 72px; height: 72px;
      background: var(--blue);
      color: #fff;
      font-size: 2rem;
    }

    .btn-lg:hover { background: #6ba0f9; }

    .btn-reset:hover {
      background: rgba(224,82,82,0.12);
      color: var(--red);
      border-color: var(--red);
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    @media (orientation: landscape) and (max-height: 500px) {
      .rotate-msg {
        display: flex !important;
      }
      body > :not(.rotate-msg) {
        display: none !important;
      }
    }

    @media (orientation: landscape) and (min-height: 501px) {
      body {
        overflow-y: auto;
        height: auto;
        min-height: 100dvh;
      }
      .main {
        padding: 20px 40px;
      }
    }

    .rotate-msg {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: var(--bg);
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      color: var(--muted);
      font-size: 1rem;
      text-align: center;
    }

    .rotate-msg svg {
      animation: spin90 1.2s ease-in-out infinite alternate;
    }

    @keyframes spin90 {
      from { transform: rotate(0deg); }
      to   { transform: rotate(-90deg); }
    }

    @media (max-width: 680px) {
      body {
        grid-template-columns: 1fr;
        grid-template-rows: 248px 1fr;
        height: 100dvh;
        overflow: hidden;
      }
      .sidebar { border-right: none; border-bottom: 1px solid var(--border); }
      .s-head { padding: 12px 16px 10px; }
      .s-head h1 { font-size: 1.1rem; }
      .s-sub { margin-top: 3px; }
      .all-ctrl { margin-top: 7px; padding-top: 7px; }
      .main { padding: 8px 16px 12px; }
      .phase-tag { margin-bottom: 6px; }
      .counter { margin-bottom: 4px; }
      .ex-title { font-size: 1.3rem; min-height: 34px; margin-bottom: 8px; }
      .ex-desc { margin-top: -6px; margin-bottom: 8px; min-height: 28px; font-size: 0.78rem; }
      .ring-wrap { width: 155px; height: 155px; margin-bottom: 10px; }
      .r-num { font-size: 3.2rem; }
      .ctrls { gap: 10px; }
      .btn-lg { width: 54px; height: 54px; }
      .btn-sm { width: 42px; height: 42px; font-size: 1.05rem; }
    }
  </style>
</head>
<body>

<div class="rotate-msg">
  <svg width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <rect x="4" y="2" width="16" height="20" rx="2"/>
    <line x1="12" y1="18" x2="12" y2="18.01"/>
  </svg>
  <span>화면을 세로로 돌려주세요</span>
</div>

<div class="browser-banner" id="browserBanner">
  <span>⚠️ 현재 브라우저에서는 소리가 지원되지 않을 수 있습니다. <strong>Chrome</strong>에서 이용해 주세요.</span>
  <a class="chrome-btn" id="chromeLink" href="#">Chrome으로 열기</a>
  <button class="banner-close" onclick="document.getElementById('browserBanner').style.display='none'">✕</button>
</div>

<aside class="sidebar">
  <div class="s-head">
    <h1>
      <span class="h1-title"><svg width="28" height="28" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" style="flex-shrink:0"><circle cx="50" cy="50" r="48" fill="#4f8ef7"/><rect x="24" y="38" width="52" height="24" fill="white" transform="rotate(-45 50 50)"/></svg> 폼롤러 운동 프로그램</span>
      <a class="yt-btn" href="https://www.youtube.com/watch?v=soRBhLxFHiw&list=WL&index=1&t=1091s" target="_blank" rel="noopener">
        <svg width="16" height="12" viewBox="0 0 16 12" fill="none" xmlns="http://www.w3.org/2000/svg"><rect width="16" height="12" rx="3" fill="#FF0000"/><path d="M6.5 3.5L10.5 6L6.5 8.5V3.5Z" fill="white"/></svg>
        영상보기
      </a>
    </h1>
    <div class="all-ctrl">
      <label>전체</label>
      <select class="all-sel" id="allSel" style="min-width:0"></select>
      <button class="all-btn" onclick="applyAll()">적용</button>
      <label style="margin-left:2px">준비</label>
      <select class="all-sel" id="prepSel" onchange="setPrepTime(+this.value)" style="min-width:0">
        <option value="3">3초</option>
        <option value="5">5초</option>
        <option value="7" selected>7초</option>
        <option value="10">10초</option>
        <option value="15">15초</option>
        <option value="20">20초</option>
      </select>
    </div>
    <div class="s-drag-handle" id="sDragHandle"></div>
    <div class="s-collapsible" id="sCollapsible">
      <div class="s-sub" id="totalTime" style="padding-bottom:10px">총 예상 시간: 계산 중...</div>
      <button class="install-btn" id="installBtn" onclick="installApp()">📲 홈 화면에 설치</button>
    </div>
  </div>
  <ul class="ex-list" id="exList"></ul>
</aside>

<main class="main">
  <div class="prog-bar"><div id="progFill"></div></div>

  <div class="phase-tag" id="phaseTag">대기</div>
  <div class="counter" id="counter">— / 25</div>
  <div class="ex-title" id="exTitle">시작을 눌러주세요</div>
  <div class="ex-desc" id="exDesc"></div>

  <div class="ring-wrap">
    <svg viewBox="0 0 240 240" class="ring-svg">
      <circle class="r-bg" cx="120" cy="120" r="108"/>
      <circle class="r-fg" id="ringFg" cx="120" cy="120" r="108"
        stroke-dasharray="678.58" stroke-dashoffset="0"/>
    </svg>
    <div class="ring-center">
      <div class="r-num" id="rNum">--</div>
      <div class="r-unit" id="rUnit">초</div>
    </div>
  </div>

  <div class="ctrls">
    <button class="btn btn-sm" onclick="prevEx()" title="이전 동작">⏮</button>
    <button class="btn btn-lg" id="playBtn" onclick="togglePlay()" title="시작/일시정지">▶</button>
    <button class="btn btn-sm" onclick="nextEx()" title="다음 동작">⏭</button>
    <button class="btn btn-sm btn-reset" onclick="resetAll()" title="처음부터">↺</button>
  </div>
</main>

  },

    desc: '무릎을 구부린 상태로 앉아 종아리 위에 폼롤러를 올린 다음 그대로 앉아서 근육을 압박하세요. 이때 발등이 바닥에 닿게 하세요.',

const exercises = EXERCISE_DATA.map(e => ({ name: e.name, desc: e.desc, dur: 90 }));
let prepTime = 7; // 다음 동작 준비 시간 (초), 기본값 7초
const C = 2 * Math.PI * 108; // 678.58

const ICON_PLAY  = '<svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M9 6v12l10-6z"/></svg>';
const ICON_PAUSE = '<svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M6 5h4v14H6zm8 0h4v14h-4z"/></svg>';

// State
let phase = 'idle'; // idle | prep | exercise | done
let cur = 0;
let tLeft = 0;
let paused = false;
let intervalId = null;
let phaseStartWall = null;
let phaseStartTLeft = null;
let lastAnnounced = -1;
const doneSet = new Set();

// DOM
const $ = id => document.getElementById(id);
const exListEl  = $('exList');
const phaseTag  = $('phaseTag');
const counterEl = $('counter');
const exTitleEl = $('exTitle');
const exDescEl  = $('exDesc');
const rNumEl    = $('rNum');
const rUnitEl   = $('rUnit');
const ringFg    = $('ringFg');
const progFill  = $('progFill');
const playBtn   = $('playBtn');
const totalTime = $('totalTime');


function setPrepTime(v) {
  prepTime = v;
  calcTotal();
}

function buildAllSel() {
  const sel = $('allSel');
  sel.innerHTML = Array.from({ length: 30 }, (_, k) => {
    const s = (k + 1) * 10;
    return `<option value="${s}"${s === 90 ? ' selected' : ''}>${s}초</option>`;
  }).join('');
}

function applyAll() {
  const v = +$('allSel').value;
  exercises.forEach((ex, i) => {
    ex.dur = v;
    const sel = document.querySelector(`#ei${i} .dur-sel`);
    if (sel) sel.value = v;
  });
  calcTotal();
}

function buildList() {
  exListEl.innerHTML = '';
  exercises.forEach((ex, i) => {
    const li = document.createElement('li');
    li.className = 'ex-item';
    li.id = `ei${i}`;
    li.onclick = () => jumpTo(i);

    const opts = Array.from({ length: 30 }, (_, k) => {
      const s = (k + 1) * 10;
      return `<option value="${s}"${s === ex.dur ? ' selected' : ''}>${s}초</option>`;
    }).join('');

    li.innerHTML = `
      <span class="ex-badge" id="eb${i}">${i + 1}</span>
      <span class="ex-name">${ex.name}</span>
      <select class="dur-sel" onchange="setDur(${i},+this.value)" onclick="event.stopPropagation()">${opts}</select>
    `;
    exListEl.appendChild(li);
  });
  calcTotal();
}

function setDur(i, v) {
  exercises[i].dur = v;
  calcTotal();
}

function calcTotal() {
  const s = exercises.reduce((a, e) => a + e.dur + prepTime, 0);
  const m = Math.floor(s / 60);
  const sec = s % 60;
  totalTime.textContent = `총 예상 시간: ${m}분${sec ? ' ' + sec + '초' : ''}`;
}

// TTS
function speak(text, cancelPrev = true) {
  if (!window.speechSynthesis) return;
  if (cancelPrev) speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'ko-KR';
  u.rate = 1.05;
  speechSynthesis.speak(u);
}

function ttsName(name) {
  return name.replace(/\(([^)]+)\)/, ', $1');
}

// Timer
function startEx(i, intro = false) {
  stopAnim();
  cur = i;
  phase = 'prep';
  tLeft = prepTime;
  paused = false;
  lastAnnounced = -1;
  if (intro) {
    speak('폼롤러 운동 프로그램을 시작합니다.');
    speak(`${ttsName(exercises[i].name)}. 준비하세요.`, false);
  } else {
    speak(`다음은 ${ttsName(exercises[i].name)}. 준비하세요.`);
  }
  render();
  startAnim();
}

function startAnim() {
  stopAnim();
  phaseStartWall = Date.now();
  phaseStartTLeft = tLeft;
  intervalId = setInterval(tick, 250);
}

function tick() {
  if (paused) return;

  const elapsed = (Date.now() - phaseStartWall) / 1000;
  tLeft = Math.max(0, phaseStartTLeft - elapsed);

  if (phase === 'prep' && tLeft <= 0) {
    phase = 'exercise';
    tLeft = exercises[cur].dur;
    lastAnnounced = -1;
    phaseStartWall = Date.now();
    phaseStartTLeft = tLeft;
    speak('시작');
    speak(exercises[cur].desc, false);
  } else if (phase === 'exercise') {
    if (tLeft <= 0) {
      tLeft = 0;
      doneSet.add(cur);
      speak('완료');
      render();
      stopAnim();
      if (cur < exercises.length - 1) {
        setTimeout(() => startEx(cur + 1), 1200);
      } else {
        phase = 'done';
        render();
        setTimeout(() => speak('모든 프로그램이 끝났습니다. 수고하셨습니다.'), 800);
      }
      return;
    }
    // 10초 단위 음성 안내
    const s = Math.floor(tLeft);
    if (s > 0 && s % 10 === 0 && s !== lastAnnounced && s < exercises[cur].dur) {
      lastAnnounced = s;
      speak(`${s}초 남았습니다`, false);
    }
  }

  render();
}

function stopAnim() {
  if (intervalId) { clearInterval(intervalId); intervalId = null; }
}

// Render
function render() {
  const ex = exercises[cur];

  phaseTag.className = 'phase-tag ' + phase;
  phaseTag.textContent = { idle: '대기', prep: '준비', exercise: '운동중', done: '완료!' }[phase];

  if (phase === 'idle') {
    counterEl.textContent = `— / ${exercises.length}`;
    exTitleEl.textContent = '시작을 눌러주세요';
    exDescEl.textContent = '';
    rNumEl.textContent = '--';
    rUnitEl.textContent = '초';
    ringFg.style.strokeDashoffset = 0;
    playBtn.innerHTML = ICON_PLAY;
    progFill.style.width = '0%';
  } else if (phase === 'done') {
    counterEl.textContent = `${exercises.length} / ${exercises.length}`;
    exTitleEl.textContent = '모든 운동 완료! 🎉';
    exDescEl.textContent = '수고하셨습니다!';
    rNumEl.textContent = '✓';
    rUnitEl.textContent = '';
    ringFg.style.stroke = 'var(--green)';
    ringFg.style.strokeDashoffset = 0;
    playBtn.innerHTML = ICON_PLAY;
    progFill.style.width = '100%';
  } else {
    counterEl.textContent = `${cur + 1} / ${exercises.length}`;
    exTitleEl.textContent = ex.name;
    exDescEl.textContent = ex.desc;

    const total = phase === 'prep' ? prepTime : ex.dur;
    const pct = Math.max(0, tLeft / total);
    rNumEl.textContent = Math.max(0, Math.ceil(tLeft));
    rUnitEl.textContent = phase === 'prep' ? '초 후 시작' : '초 남음';
    ringFg.style.stroke = phase === 'prep' ? 'var(--orange)' : 'var(--green)';
    ringFg.style.strokeDashoffset = C * (1 - pct);
    playBtn.innerHTML = paused ? ICON_PLAY : ICON_PAUSE;

    // 전체 진행률
    let p = doneSet.size / exercises.length;
    if (phase === 'exercise') p += (1 - pct) / exercises.length;
    progFill.style.width = (Math.min(1, p) * 100) + '%';
  }

  // 목록 상태 업데이트
  exercises.forEach((_, i) => {
    const li = $(`ei${i}`);
    const badge = $(`eb${i}`);
    if (!li) return;
    li.className = 'ex-item'
      + (i === cur && phase !== 'idle' ? ' active' : '')
      + (doneSet.has(i) ? ' done' : '');
    badge.textContent = doneSet.has(i) ? '✓' : i + 1;
  });

  if (phase !== 'idle') {
    $(`ei${cur}`)?.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }
}

// Controls
function togglePlay() {
  if (phase === 'idle' || phase === 'done') {
    doneSet.clear();
    startEx(0, true);
  } else if (paused) {
    paused = false;
    phaseStartWall = Date.now();
    phaseStartTLeft = tLeft;
    intervalId = setInterval(tick, 250);
    render();
  } else {
    paused = true;
    speechSynthesis.cancel();
    render();
  }
}

function prevEx() {
  if (phase === 'idle') return;
  speechSynthesis.cancel();
  const target = Math.max(0, cur - 1);
  doneSet.delete(target);
  doneSet.delete(cur);
  startEx(target);
}

function nextEx() {
  if (phase === 'idle' || cur >= exercises.length - 1) return;
  speechSynthesis.cancel();
  doneSet.add(cur);
  startEx(cur + 1);
}

function jumpTo(i) {
  speechSynthesis.cancel();
  if (phase === 'idle') {
    for (let j = 0; j < i; j++) doneSet.add(j);
  }
  startEx(i);
}

function resetAll() {
  stopAnim();
  speechSynthesis.cancel();
  phase = 'idle';
  cur = 0;
  tLeft = 0;
  paused = false;
  doneSet.clear();
  render();
}

// Init
buildAllSel();
buildList();
render();

// PWA 설치
let deferredPrompt = null;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById('installBtn').style.display = 'flex';
});
window.addEventListener('appinstalled', () => {
  document.getElementById('installBtn').style.display = 'none';
  deferredPrompt = null;
});
function installApp() {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  deferredPrompt.userChoice.then(() => {
    deferredPrompt = null;
    document.getElementById('installBtn').style.display = 'none';
  });
}

// 화면 세로 고정 (Android Chrome PWA 지원)
function lockPortrait() {
  try {
    screen.orientation.lock('portrait').catch(() => {});
  } catch (e) {}
}
lockPortrait();
document.addEventListener('visibilitychange', () => {
  if (!document.hidden) {
    lockPortrait();
    // 화면이 켜졌을 때 타이머가 진행 중이면 음성 안내 재개
    if (!paused && phase !== 'idle' && phase !== 'done') {
      speechSynthesis.cancel();
      const s = Math.floor(tLeft);
      if (phase === 'exercise' && s > 0) {
        speak(`${s}초 남았습니다`);
      } else if (phase === 'prep') {
        speak('준비하세요');
      }
    }
  }
});

// 서비스워커 등록
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js');
}

// 브라우저 감지
(function() {
  const ua = navigator.userAgent;
  const isChrome = /Chrome/.test(ua) && !/Naver|SamsungBrowser|OPR|Opera|KAKAO|kakaotalk/i.test(ua);
  const isEdge   = /Edg\//.test(ua);
  if (isChrome || isEdge) return;

  const banner = document.getElementById('browserBanner');
  const url    = location.href;
  const isAndroid = /Android/.test(ua);
  const isIOS     = /iPhone|iPad/.test(ua);

  const link = document.getElementById('chromeLink');
  if (isAndroid) {
    link.href = `intent://${location.host}${location.pathname}#Intent;scheme=https;package=com.android.chrome;end`;
  } else if (isIOS) {
    link.href = `googlechrome://${location.host}${location.pathname}`;
  } else {
    link.href = url;
    link.target = '_blank';
    link.textContent = 'URL 복사';
    link.onclick = e => {
      e.preventDefault();
      navigator.clipboard.writeText(url).then(() => {
        link.textContent = '복사됨!';
        setTimeout(() => link.textContent = 'URL 복사', 2000);
      });
    };
  }

  banner.style.display = 'flex';
})();

// 사이드바 헤더 드래그 핸들
(function () {
  const handle = document.getElementById('sDragHandle');
  const col    = document.getElementById('sCollapsible');
  let startY = null;
  let isOpen = false;

  function setOpen(val) {
    isOpen = val;
    col.classList.toggle('open', isOpen);
    handle.classList.toggle('open', isOpen);
  }

  handle.addEventListener('pointerdown', e => {
    startY = e.clientY;
    handle.setPointerCapture(e.pointerId);
  });

  handle.addEventListener('pointerup', e => {
    if (startY === null) return;
    const dy = e.clientY - startY;
    if      (dy >  12 && !isOpen) setOpen(true);
    else if (dy < -12 &&  isOpen) setOpen(false);
    else if (Math.abs(dy) < 8)    setOpen(!isOpen); // 탭
    startY = null;
  });

  handle.addEventListener('pointercancel', () => { startY = null; });
})();
</script>
